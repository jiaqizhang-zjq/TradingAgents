[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Python 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试

# 覆盖率配置（需要pytest-cov）
# addopts = --cov=tradingagents --cov-report=html --cov-report=term
